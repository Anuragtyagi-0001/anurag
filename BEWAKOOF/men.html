<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="men.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <img src="https://images.bewakoof.com/web/ic-desktop-bwkf-trademark-logo.svg" class="logo" />
    <ul>
      <li>MEN</li>
      <li>WOMEN</li>
      <li>MOBILE COVERS</li>
    </ul>
  </div>

  <div class="nav-right">
    <input type="text" placeholder="Search by products" />
   <button class="login-btn" onclick="openLogin()">Login</button>


<div class="overlay" id="overlay" onclick="closeLogin()"></div>


<div class="login-panel" id="loginPanel">
<span class="close-btn" onclick="closeLogin()">×</span>


<h2>Login</h2>


<input type="email" placeholder="Email" />
<input type="password" placeholder="Password" />


<button>Sign In</button>
</div>
    <span>👜</span>
  </div>
</nav>
<div class="filters">
  <h3>Filters</h3>

  <div class="filter-box">
    <div class="filter-title">Category</div>

    <label><input type="checkbox"> T-Shirt</label>
    <label><input type="checkbox"> Shirt</label>
    <label><input type="checkbox"> Hoodies</label>
    <label><input type="checkbox"> Joggers</label>
    <label><input type="checkbox"> Vest</label>

    <a href="#" class="show-more">Show</a>
  </div>

  <div class="filter-box">
    <div class="filter-title">Sizes</div>

    <label><input type="checkbox"> XS</label>
    <label><input type="checkbox"> S</label>
    <label><input type="checkbox"> M</label>
    <label><input type="checkbox"> L</label>
    <label><input type="checkbox"> XL</label>
  </div>
</div>
<div class="products">

  <div class="product-card">
    <img src="https://images.bewakoof.com/t640/men-s-blue-dementors-graphic-printed-t-shirt-589152-1755510033-1.gif" />

    <h4>Graphic Printed T-Shirt</h4>

    <div class="rating">⭐ 4.6</div>

    <div class="price">
      ₹499 <span>₹999</span>
    </div>
  </div>


  <div class="product-card">
    <img src="https://images.bewakoof.com/t640/men-s-grey-pyjamas-581594-1747894023-1.jpg" />

    <h4>Oversized Fit T-Shirt</h4>

    <div class="rating">⭐ 4.5</div>

    <div class="price">
      ₹599 <span>₹1199</span>
    </div>
  </div>


  <div class="product-card">
    <img src="https://images.bewakoof.com/t320/1004263_2026-02-07t04-42-50_1.jpg" />

    <h4>Plain Cotton T-Shirt</h4>

    <div class="rating">⭐ 4.7</div>

    <div class="price">
      ₹399 <span>₹799</span>
    </div>
  </div>

</div>
